<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Roadmap — The Learning Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1116;--panel:#161B22;--surf:#1C2430;--surf2:#222C3A;
  --ink:#E6EDF3;--muted:#8B98A8;--faint:#5C6B7E;--line:#2A3442;
  --teal:#5EC8C2;--teal-dim:#1A3A38;
  --violet:#A78BFA;--violet-dim:#1E1A2E;
  --amber:#E6B450;--amber-dim:#2B230A;
  --coral:#E8896B;--coral-dim:#2E1A12;
  --green:#5BD68B;--green-dim:#0D2B1A;
  --dp:'Space Grotesk',system-ui,sans-serif;
  --bd:'Inter',system-ui,sans-serif;
  --mo:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--bd);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

nav{position:sticky;top:0;z-index:100;background:rgba(14,17,22,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-inner{max-width:1000px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-logo{font-family:var(--mo);font-size:12px;color:var(--faint);display:flex;align-items:center;gap:8px}
.nav-logo a{color:var(--faint);transition:color .15s}.nav-logo a:hover{color:var(--teal)}
.nav-logo .sep{color:var(--line)}
.nav-mod{font-family:var(--mo);font-size:12px;color:var(--coral)}

.wrap{max-width:1000px;margin:0 auto;padding:0 24px}

/* hero */
.hero{padding:56px 0 36px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:var(--mo);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--coral);margin-bottom:14px}
.hero h1{font-family:var(--dp);font-weight:700;font-size:clamp(28px,4vw,44px);line-height:1.08;letter-spacing:-.025em;margin-bottom:16px}
.hero-sub{color:var(--muted);font-size:15px;line-height:1.72;max-width:60ch;margin-bottom:26px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{font-family:var(--mo);font-size:11px;padding:5px 12px;border-radius:20px;background:var(--surf);border:1px solid var(--line);color:var(--muted)}
.stat strong{color:var(--ink)}

/* tabs (roadmap/track switcher) */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.tab{font-family:var(--mo);font-size:12px;padding:7px 16px;border-radius:99px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s}
.tab-dot{width:7px;height:7px;border-radius:50%}
.tab:hover{border-color:var(--ink);color:var(--ink)}
.tab.on{border-color:transparent}
.roadmap-soon{padding:40px 0;color:var(--muted);font-size:14px;line-height:1.7}

/* progress bar */
.progress-wrap{margin:28px 0 0}
.progress-label{display:flex;justify-content:space-between;font-family:var(--mo);font-size:11px;color:var(--faint);margin-bottom:8px}
.progress-bar{height:8px;background:var(--surf);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));border-radius:5px;transition:width 1s ease}

/* phase */
.phase{padding:40px 0;border-bottom:1px solid var(--line)}
.phase-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.phase-num{font-family:var(--mo);font-size:11px;padding:4px 10px;border-radius:6px;font-weight:600}
.phase-title{font-family:var(--dp);font-weight:700;font-size:20px}
.phase-meta{font-family:var(--mo);font-size:11px;color:var(--faint);margin-bottom:20px;margin-left:2px}

.p1 .phase-num{background:var(--teal-dim);color:var(--teal)}
.p2 .phase-num{background:var(--violet-dim);color:var(--violet)}
.p3 .phase-num{background:var(--amber-dim);color:var(--amber)}
.p4 .phase-num{background:var(--coral-dim);color:var(--coral)}

/* module cards */
.mod-list{display:flex;flex-direction:column;gap:12px}
.mod{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;position:relative;transition:border-color .15s;display:block}
.mod.clickable{cursor:pointer}
.mod.clickable:hover{border-color:var(--acc)}
.mod-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px}
.mod-left{display:flex;align-items:center;gap:12px}
.mod-status{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-family:var(--mo)}
.st-done{background:var(--green-dim);color:var(--green);border:1px solid var(--green)}
.st-next{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal);animation:pulse 2.4s ease-in-out infinite}
.st-locked{background:var(--surf);color:var(--faint);border:1px solid var(--line)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(94,200,194,.4)}50%{box-shadow:0 0 0 5px rgba(94,200,194,0)}}
.mod-num{font-family:var(--mo);font-size:10px;color:var(--faint);letter-spacing:.08em}
.mod-title{font-family:var(--dp);font-weight:600;font-size:16px;margin-top:1px}
.mod-badge{font-family:var(--mo);font-size:10px;padding:3px 9px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.bd-done{background:var(--green-dim);color:var(--green)}
.bd-next{background:var(--teal-dim);color:var(--teal)}
.bd-locked{background:var(--surf);color:var(--faint)}
.mod-est{font-family:var(--mo);font-size:10px;color:var(--faint);margin-top:2px}
.mod-topics{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
.topic{font-family:var(--mo);font-size:10px;background:var(--surf);color:var(--muted);border:1px solid var(--line);padding:3px 8px;border-radius:4px}
.mod-unlocks{font-size:13px;color:var(--muted);line-height:1.6;padding-top:10px;border-top:1px solid var(--line)}
.mod-unlocks strong{color:var(--ink)}
.unlock-label{font-family:var(--mo);font-size:9px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-right:6px}
.mod-cta{font-family:var(--mo);font-size:11px;color:var(--teal);margin-top:10px;display:inline-flex;align-items:center;gap:5px}

/* rationale */
.rationale{padding:40px 0;border-bottom:1px solid var(--line)}
.sec-h{font-family:var(--dp);font-weight:700;font-size:20px;margin-bottom:18px}
.rat-grid{display:flex;flex-direction:column;gap:12px}
.rat-item{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--violet);border-radius:0 8px 8px 0;padding:14px 16px}
.rat-key{font-family:var(--mo);font-size:12px;color:var(--violet);margin-bottom:4px}
.rat-body{font-size:13px;color:var(--muted);line-height:1.6}
.rat-body strong{color:var(--ink)}

footer{padding:28px 0}
.foot-inner{max-width:1000px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.foot-l,.foot-r{font-family:var(--mo);font-size:11px;color:var(--faint)}
.foot-r a{color:var(--teal)}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo">
      <a href="index.html">the-learning-lab</a>
      <span class="sep">/</span><span class="nav-mod">Roadmap</span>
    </div>
    <span id="nav-track" style="font-family:var(--mo);font-size:11px;color:var(--faint)"></span>
  </div>
</nav>

<div class="hero">
  <div class="wrap">
    <div class="tabs" id="tabs"></div>
    <p class="eyebrow" id="rm-eyebrow"></p>
    <h1 id="rm-title"></h1>
    <p class="hero-sub" id="rm-sub"></p>
    <div class="stats" id="rm-stats"></div>
    <div class="progress-wrap" id="rm-progress-wrap">
      <div class="progress-label"><span>Progress</span><span id="prog-text"></span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>
</div>

<div id="phases-container"></div>

<div class="rationale" id="rationale-section">
  <div class="wrap">
    <h2 class="sec-h">Why this order</h2>
    <div class="rat-grid" id="rat-grid"></div>
  </div>
</div>

<footer>
  <div class="foot-inner">
    <span class="foot-l" id="foot-track">the-learning-lab</span>
    <span class="foot-r"><a href="index.html">← Back to Learning Lab</a></span>
  </div>
</footer>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DATA  ← one entry per roadmap/track. ids match index.html's TRACKS ids.
   To add a new roadmap: break the topic into phases/modules (same shape as
   below), add an entry here, and add the matching track to index.html.
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const ROADMAPS = [
  {
    id: 'mdm-spark', label: 'MDM / Spark', color: 'teal',
    eyebrow: 'MDM / Spark Learning Track',
    title: 'The Full Roadmap',
    sub: 'Nine modules across four phases — from Spark foundations through the entity resolution algorithms to a full pipeline-design capstone. Each module unlocks the next. This is the complete plan, ordered so every module builds on what came before.',
    stats: ['<strong>9</strong> modules', '<strong>4</strong> phases', '<strong>~8–9</strong> sessions', 'use depth throughout'],
    phases: [
      {
        n: 1, cls: 'p1', title: 'Spark Foundations', meta: 'The toolkit you need to write good ER code · ~2–2.5 sessions',
        modules: [
          { num:'00', title:'Entity Resolution Overview', status:'done', est:'done', href:'modules/entity-resolution-walkthrough.html', acc:'var(--teal)',
            topics:['blocking','shuffle','self-join','skew'],
            unlocks:'The full pipeline traced end to end — standardize → block → shuffle → self-join → score → skew.' },
          { num:'01', title:'Complex Types & Nested Data', status:'done', est:'done', href:'modules/nested-types-decision-card.html', acc:'var(--teal)',
            topics:['arrays','structs','maps','explode'],
            unlocks:'Read and write the nested entity structures your MDM pipeline actually stores.' },
          { num:'02', title:'String Processing & Normalization', status:'done', est:'done', href:'modules/string-processing-normalization.html', acc:'var(--teal)',
            topics:['jaro-winkler','levenshtein','soundex','normalization'],
            unlocks:'Know what your StandardizationPlugin should normalize and exactly why each rule exists.' },
          { num:'03', title:'Window Functions', status:'done', est:'done', href:'modules/window-functions.html', acc:'var(--teal)',
            topics:['row_number','rank','lag','dedup'],
            unlocks:'Assign row numbers, pick latest record per entity, build golden record selection.' },
        ]
      },
      {
        n: 2, cls: 'p2', title: 'The ER Algorithms', meta: 'Scoring and combining matches into verdicts · ~2 sessions',
        modules: [
          { num:'04', title:'Match Scoring & Classification', status:'done', est:'done', href:'modules/match-scoring-classification.html', acc:'var(--violet)',
            topics:['field weighting','composite scores','thresholds','null handling'],
            unlocks:'Combine per-field similarity scores into a single match/review/no-match verdict — the heart of your ScoringPlugin.' },
          { num:'05', title:'Score Aggregation & Confidence', status:'done', est:'done', href:'modules/score-aggregation-confidence.html', acc:'var(--violet)',
            topics:['weighted aggregation','confidence bands','review queues','precision vs recall'],
            unlocks:'Tune the thresholds that decide which pairs auto-merge, which go to human review, and which are rejected.' },
        ]
      },
      {
        n: 3, cls: 'p3', title: 'ER at Scale', meta: 'Approximate matching and clustering for millions of records · ~2 sessions',
        modules: [
          { num:'06', title:'LSH & MinHash', status:'next', est:'~1 session', acc:'var(--amber)',
            topics:['minhash','banding','jaccard','candidate generation'],
            unlocks:'Find candidate pairs at scale without comparing every record to every other — approximate blocking that complements your self-join.' },
          { num:'07', title:'Graph Theory & Clustering', status:'locked', est:'~1 session', acc:'var(--amber)',
            topics:['connected components','union-find','BFS/DFS','transitive matches'],
            unlocks:'See how matched pairs merge into one master entity — the final ER step that turns pairs into clusters.' },
        ]
      },
      {
        n: 4, cls: 'p4', title: 'Pipeline Mastery — Capstone', meta: 'Performance and full architecture design · ~2 sessions',
        modules: [
          { num:'08', title:'Spark Performance (Remaining Levers)', status:'locked', est:'~1 session', acc:'var(--coral)',
            topics:['column pruning','predicate pushdown','memory tuning','partition sizing'],
            unlocks:'Optimize the full pipeline beyond shuffle/join/skew — the remaining performance levers.' },
          { num:'09', title:'Pipeline Design (Capstone)', status:'locked', est:'~1 session', acc:'var(--coral)',
            topics:['join-back strategies','enrichment','intermediate datasets','YAML plugin arch'],
            unlocks:'Design the full MDM entity resolution architecture end to end with confidence.' },
        ]
      }
    ],
    rationale: [
      { key: '01 before 04', body: "You can't score strings without first knowing how strings are <strong>processed and stored</strong>. Nested types and normalization come before the scoring algorithms that consume them." },
      { key: '03 in Phase 1, not Phase 2', body: 'Window functions are <strong>Spark mechanics</strong>, not entity-resolution concepts. They finish the foundations so the toolkit feels complete before you touch scoring.' },
      { key: '06 (LSH) before 07 (graph)', body: 'LSH produces another stream of candidate pairs. Graph clustering consumes <strong>all</strong> pairs — from both blocking and LSH — and merges them into entities. So LSH must be understood first.' },
      { key: '09 last (capstone)', body: 'The pipeline-design capstone needs vocabulary from <strong>every prior module</strong> to reason about each architectural decision — which joins to broadcast, where shuffles live, how LSH integrates with blocking.' },
    ]
  },
  {
    id: 'python-backend', label: 'Python / Backend', color: 'violet',
    eyebrow: 'Python / Backend Track',
    title: 'The Full Roadmap',
    sub: 'Python fundamentals through real pipeline code, PipelineEngine internals, and backend patterns — for someone coming from a data background into engineering. Phases will fill in as sessions happen.',
    stats: ['<strong>1</strong> module planned', 'phases TBD as the roadmap is built out'],
    phases: [
      {
        n: 1, cls: 'p1', title: 'Engine Internals', meta: 'Reading and extending a production pipeline engine · ~1 session',
        modules: [
          { num:'01', title:'PipelineEngine Internals', status:'locked', est:'~1 session', acc:'var(--violet)',
            topics:['pipeline','python','architecture'],
            unlocks:'Blueprint vs instance, step lifecycle, registry, context object — the mental model for reading and extending a production pipeline engine.' },
        ]
      }
    ],
    rationale: []
  }
];

const statusIcon = { done:'✓', next:'▶', locked:'🔒' };
const statusClass = { done:'st-done', next:'st-next', locked:'st-locked' };
const badgeClass = { done:'bd-done', next:'bd-next', locked:'bd-locked' };
const badgeText = { done:'completed', next:'up next', locked:'planned' };
const TC = { teal:['var(--teal-dim)','var(--teal)'], violet:['var(--violet-dim)','var(--violet)'], amber:['var(--amber-dim)','var(--amber)'] };

function buildTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  ROADMAPS.forEach((r,i) => {
    const [bg,fg] = TC[r.color];
    const b = document.createElement('button');
    b.className = 'tab' + (i===0?' on':'');
    b.dataset.id = r.id;
    b.style.cssText = i===0 ? `background:${bg};color:${fg};border-color:transparent` : '';
    b.innerHTML = `<span class="tab-dot" style="background:${fg}"></span>${r.label}`;
    b.addEventListener('click', () => activate(r.id));
    el.appendChild(b);
  });
}

function renderRoadmap(id){
  const r = ROADMAPS.find(x => x.id === id) || ROADMAPS[0];

  document.getElementById('rm-eyebrow').textContent = r.eyebrow;
  document.getElementById('rm-title').textContent = r.title;
  document.getElementById('rm-sub').textContent = r.sub;
  document.getElementById('rm-stats').innerHTML = r.stats.map(s => `<span class="stat">${s}</span>`).join('');
  document.getElementById('nav-track').textContent = r.label + ' Track';
  document.getElementById('foot-track').textContent = `the-learning-lab · ${r.label} roadmap`;

  const container = document.getElementById('phases-container');
  container.innerHTML = '';

  if (!r.phases.length) {
    container.innerHTML = `<div class="wrap"><div class="roadmap-soon">This roadmap hasn't been broken into modules yet — give the topic to a learning session and ask to plan it out.</div></div>`;
  }

  r.phases.forEach(ph => {
    const phaseEl = document.createElement('div');
    phaseEl.className = `phase ${ph.cls}`;

    let modsHtml = '';
    ph.modules.forEach(m => {
      const clickable = m.href ? 'clickable' : '';
      const tag = m.href ? 'a' : 'div';
      const hrefAttr = m.href ? `href="${m.href}"` : '';
      const cta = m.status === 'done' ? '<div class="mod-cta">Open module →</div>'
                : m.status === 'next' ? '<div class="mod-cta">Say "start Module ' + m.num + '" to begin →</div>'
                : '';
      modsHtml += `
        <${tag} ${hrefAttr} class="mod ${clickable}" style="--acc:${m.acc}">
          <div class="mod-top">
            <div class="mod-left">
              <div class="mod-status ${statusClass[m.status]}">${statusIcon[m.status]}</div>
              <div>
                <div class="mod-num">Module ${m.num}</div>
                <div class="mod-title">${m.title}</div>
                <div class="mod-est">${m.est}</div>
              </div>
            </div>
            <span class="mod-badge ${badgeClass[m.status]}">${badgeText[m.status]}</span>
          </div>
          <div class="mod-topics">${m.topics.map(t=>`<span class="topic">${t}</span>`).join('')}</div>
          <div class="mod-unlocks"><span class="unlock-label">Unlocks</span>${m.unlocks}</div>
          ${cta}
        </${tag}>`;
    });

    phaseEl.innerHTML = `
      <div class="wrap">
        <div class="phase-head">
          <span class="phase-num">PHASE ${ph.n}</span>
          <span class="phase-title">${ph.title}</span>
        </div>
        <div class="phase-meta">${ph.meta}</div>
        <div class="mod-list">${modsHtml}</div>
      </div>`;
    container.appendChild(phaseEl);
  });

  // progress
  const allMods = r.phases.flatMap(p => p.modules);
  const doneCount = allMods.filter(m => m.status === 'done').length;
  const total = allMods.length;
  const progressWrap = document.getElementById('rm-progress-wrap');
  if (!total) {
    progressWrap.style.display = 'none';
  } else {
    progressWrap.style.display = '';
    document.getElementById('prog-text').textContent = `${doneCount} of ${total} complete`;
    document.getElementById('prog-fill').style.width = '0%';
    setTimeout(() => {
      document.getElementById('prog-fill').style.width = `${(doneCount/total)*100}%`;
    }, 200);
  }

  // rationale
  const ratSection = document.getElementById('rationale-section');
  const ratGrid = document.getElementById('rat-grid');
  if (!r.rationale.length) {
    ratSection.style.display = 'none';
  } else {
    ratSection.style.display = '';
    ratGrid.innerHTML = r.rationale.map(item => `
      <div class="rat-item">
        <div class="rat-key">${item.key}</div>
        <div class="rat-body">${item.body}</div>
      </div>`).join('');
  }
}

function activate(id){
  document.querySelectorAll('.tab').forEach(b => {
    const r = ROADMAPS.find(x => x.id === b.dataset.id);
    const [bg,fg] = TC[r.color];
    if (b.dataset.id === id) {
      b.classList.add('on');
      b.style.cssText = `background:${bg};color:${fg};border-color:transparent`;
    } else {
      b.classList.remove('on');
      b.style.cssText = '';
    }
  });
  renderRoadmap(id);
}

buildTabs();
activate(ROADMAPS[0].id);
</script>
</body>
</html>
